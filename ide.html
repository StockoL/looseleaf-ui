<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LooseLeaf UI | Live IDE</title>

    <link rel="stylesheet" href="assets/00-harmonics.css" />
    <link rel="stylesheet" href="assets/01-primitives.css" />

    <style>
      /* IDE-Specific Aesthetics (Dark Mode) */
      body {
        background-color: #1e1e1e;
        color: #cccccc;
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        font-family: system-ui, sans-serif;
      }

      .ide-header {
        padding: 1rem 1.5rem;
        background: #252526;
        border-bottom: 1px solid #3c3c3c;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .ide-title {
        font-weight: 600;
        color: #ffffff;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        font-size: 0.85rem;
      }

      /* The Split Workspace */
      .workspace {
        flex-grow: 1;
        height: calc(100vh - 55px);
      }

      .editor-pane {
        width: 100%;
        height: 100%;
        background: #1e1e1e;
        color: #9cdcfe;
        font-family: "Courier New", Courier, monospace;
        font-size: 15px;
        line-height: 1.5;
        padding: 1.5rem;
        border: none;
        border-right: 1px solid #3c3c3c;
        outline: none;
        resize: none;
      }

      .preview-pane {
        width: 100%;
        height: 100%;
        border: none;
        background: #ffffff;
      }
    </style>
  </head>
  <body>
    <header class="ide-header">
      <div class="ide-title">LooseLeaf UI // Live REPL</div>
    </header>

    <l-grid class="workspace" style="--grid-min: 300px; gap: 0">
      <div>
        <textarea id="html-editor" class="editor-pane" spellcheck="false">
<l-stack style="--space: var(--s3);">
  
  <div>
    <h2>Component Composition</h2>
    <p class="u-text-muted">Mixing primitives and atoms seamlessly.</p>
  </div>

  <article class="c-card">
    <l-stack style="--space: var(--s1);">
      <h3>Action Required</h3>
      <p>Do you want to deploy the latest changes to production?</p>
      
      <l-cluster>
        <button class="c-button" data-loudness="murmur">Cancel</button>
        <button class="c-button" data-loudness="cheer">Deploy Now</button>
      </l-cluster>
    </l-stack>
  </article>

</l-stack>
      </textarea
        >
      </div>

      <div>
        <iframe id="preview-frame" class="preview-pane"></iframe>
      </div>
    </l-grid>

    <script src="assets/ide.js"></script>
  </body>
</html>
